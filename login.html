<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Represente-me! | Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fontes Premium -->
    <!-- Arial is the primary font (system default) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <img src="logo.png" alt="Logo" style="height: 32px; filter: brightness(0) invert(1); margin-bottom: 24px;">
                <h2 id="formTitle">Bem-vindo de <span>volta!</span></h2>
                <p id="formSubtitle">Acesse sua plataforma de soluções em vendas.</p>
            </div>

            <!-- ============ FORMULÁRIO DE LOGIN ============ -->
            <form id="loginForm" class="login-form" data-visible="true">
                <div class="input-group">
                    <label for="loginEmail">E-mail</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope icon-input'></i>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Senha</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt icon-input'></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class='bx bx-low-vision pwd-toggle' onclick="togglePwd('loginPassword', this)"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        Lembrar
                    </label>
                    <a href="#" class="forgot-pwd" onclick="event.preventDefault(); mostrarToast('Funcionalidade em desenvolvimento.', 'info')">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-login">
                    <span id="btnLoginText">Entrar</span>
                    <i class='bx bx-right-arrow-alt'></i>
                </button>
                <div class="divider"><span>ou acesse com</span></div>
                <div class="social-login">
                    <button type="button" class="social-btn" id="btnGoogle" onclick="loginComGoogle()">
                        <i class='bx bxl-google'></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="simularOAuth('Microsoft')">
                        <i class='bx bxl-windows'></i> Microsoft
                    </button>
                </div>
                <p class="signup-link">Não tem uma conta? <a href="#" onclick="event.preventDefault(); switchForm('signup')">Criar Conta</a></p>
            </form>

            <!-- ============ FORMULÁRIO DE CADASTRO ============ -->
            <form id="signupForm" class="login-form" data-visible="false" style="display:none;">
                <div class="input-group">
                    <label for="regName">Nome Completo</label>
                    <div class="input-wrapper">
                        <i class='bx bx-user icon-input'></i>
                        <input type="text" id="regName" placeholder="Seu nome completo" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="regEmail">E-mail</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope icon-input'></i>
                        <input type="email" id="regEmail" placeholder="seu@email.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="regPassword">Senha (mín. 4 caracteres)</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt icon-input'></i>
                        <input type="password" id="regPassword" placeholder="••••••••" minlength="4" required>
                        <i class='bx bx-low-vision pwd-toggle' onclick="togglePwd('regPassword', this)"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="regPasswordConfirm">Confirmar Senha</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock icon-input'></i>
                        <input type="password" id="regPasswordConfirm" placeholder="••••••••" minlength="4" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <span id="btnSignupText">Criar Conta</span>
                    <i class='bx bx-user-plus'></i>
                </button>
                <p class="signup-link">Já tem uma conta? <a href="#" onclick="event.preventDefault(); switchForm('login')">Fazer Login</a></p>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
        function mostrarToast(mensagem, tipo, duracao) {
            tipo = tipo || 'success';
            duracao = duracao || 4000;
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + tipo;
            var icone = tipo === 'success' ? 'bx-check-circle' : (tipo === 'info' ? 'bx-info-circle' : 'bx-error-circle');
            toast.innerHTML = "<i class='bx " + icone + "'></i><div class='toast-content'><p>" + mensagem + "</p></div>";
            container.appendChild(toast);
            setTimeout(function () {
                toast.style.animation = 'slideOut 0.3s forwards';
                setTimeout(function () { toast.remove(); }, 300);
            }, duracao);
        }
    </script>
    <script type="module" src="login.js"></script>
</body>
</html>
